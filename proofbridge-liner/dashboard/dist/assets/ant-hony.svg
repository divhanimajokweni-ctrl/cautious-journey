<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Ant silhouette with holographic effect -->
  <defs>
    <linearGradient id="holo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ED1C24" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E2725B" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Ant body segments -->
  <ellipse cx="50" cy="55" rx="30" ry="20" fill="url(#holo-gradient)" filter="url(#glow)"/>
  <ellipse cx="35" cy="50" rx="12" ry="16" fill="url(#holo-gradient)" filter="url(#glow)"/>
  <ellipse cx="65" cy="50" rx="12" ry="16" fill="url(#holo-gradient)" filter="url(#glow)"/>
  
  <!-- Head -->
  <circle cx="30" cy="50" r="10" fill="#FFD700" filter="url(#glow)"/>
  
  <!-- Eyes -->
  <circle cx="28" cy="48" r="2" fill="#0A0A0A"/>
  <circle cx="32" cy="48" r="2" fill="#0A0A0A"/>
  
  <!-- Antennae -->
  <path d="M25 42 Q20 30, 15 25" stroke="#FFD700" stroke-width="2" fill="none" filter="url(#glow)"/>
  <path d="M35 42 Q40 30, 45 25" stroke="#FFD700" stroke-width="2" fill="none" filter="url(#glow)"/>
  
  <!-- Legs (6) -->
  <g stroke="#FFD700" stroke-width="1.5" fill="none">
    <path d="M40 65 L35 75 M35 75 L30 80"/>
    <path d="M50 68 L50 80 M50 80 L50 85"/>
    <path d="M60 65 L65 75 M65 75 L70 80"/>
  </g>
</svg>
