name: Gate-1 CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate-1-smoke:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PROOFBRIDGE_HMAC_SECRET: ci-gate-1-hmac-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run Gate-1 smoke tests
        run: node --test test/gate1-smoke.test.js
