name: Deploy ProofBridge Liner

on:
  workflow_dispatch:
  push:
    branches: [lablab.ai-hackathon, main]
    paths:
      - api/**
      - dashboard/**
      - vercel.json
      - .github/workflows/deploy-vercel.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.PROOFBRIDGE_LINER_VERCEL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GH_PAT }}
          submodules: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies (root)
        run: npm install

      - name: Syntax-check API files
        run: cd api && node --check verify.js && node --check kernel.js

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: |
          [ -n "$VERCEL_TOKEN" ] || { echo "ERROR: PROOFBRIDGE_LINER_VERCEL secret is missing"; exit 1; }
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --project="$VERCEL_PROJECT_ID"

      - name: Build Production
        run: vercel build --prod --yes --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --project="$VERCEL_PROJECT_ID"

      - name: Deploy Production
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --project="$VERCEL_PROJECT_ID"
