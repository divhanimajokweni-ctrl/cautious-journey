\* TLC model-checker configuration for SafetyKernel.tla
\* Run: java -jar tla2tools.jar -config proofs/SafetyKernel.cfg proofs/SafetyKernel.tla

CONSTANTS
  THRESHOLD    = 75
  MAX_POSTERIOR = 100

INVARIANT
  Inv_HaltedAbsorbingForUnauth
  Inv_PosteriorBounded
  Inv_StateValid
  Inv_ActorValid

PROPERTY
  Live_AuthEventuallyResets

CHECK_DEADLOCK TRUE
