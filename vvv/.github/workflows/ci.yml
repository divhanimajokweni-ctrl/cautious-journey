env:
  NODE_VERSION: '20'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: |
          cd api && npm install
          cd ../test && npm init -y && npm install --save-dev jest node-fetch@3
      - name: Run tests
        run: npx jest
        working-directory: ./test

  build-docs:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install Pandoc + TeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended fonts-noto fonts-noto-color-emoji
      - name: Build whitepaper PDF
        run: |
          pandoc docs/whitepaper.md \
            --pdf-engine=xelatex \
            -V geometry:margin=1in \
            -V fontsize=11pt \
            -V mainfont="Noto Serif" \
            -V monofont="JetBrains Mono" \
            -o docs/whitepaper.pdf
      - name: Build pitch deck PDF
        run: |
          pandoc docs/deck.md \
            -V geometry:margin=0.75in \
            -V fontsize=14pt \
            -V mainfont="Orbitron" \
            -V monofont="JetBrains Mono" \
            -o docs/deck.pdf
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proofbridge-docs
          path: |
            docs/whitepaper.pdf
            docs/deck.pdf
          retention-days: 90